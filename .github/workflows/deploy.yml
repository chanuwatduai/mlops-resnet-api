name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Unit Tests
        run: |
          pytest test_api.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Install Git LFS
        run: git lfs install
        
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          run: |
          rm -rf .git
          git init
          git checkout -b main
          git config --global user.email "bot@example.com"
          git config --global user.name "GitHub Actions Bot"
          
          rm -rf ModleTest
          rm -rf __pycache__
          
          git lfs install
          git lfs track "*.safetensors"
          git lfs track "*.onnx"
          git lfs track "*.data"
          
          git add .
          git commit -m "Final Deploy: Cleanup and LFS Support"
          git push https://Chanuwat0201110:$HF_TOKEN@huggingface.co/spaces/Chanuwat0201110/mlops-resnet-api main -f