name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Unit Tests
        run: |
          pytest test_api.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@example.com"
          git config --global user.name "GitHub Actions Bot"
          # เปลี่ยนYOUR_HF_USERNAME และ YOUR_SPACE_NAME ให้เป็นของคุณ 
          # เช่น https://chanuwatduai:$HF_TOKEN@huggingface.co/spaces/chanuwatduai/mlops-resnet-api
          git push https://chanuwatduai:$HF_TOKEN@huggingface.co/spaces/chanuwatduai/mlops-resnet-api main -f